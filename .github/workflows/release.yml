name: Release to PyPI

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
      contents: write

    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          version: ">=0.7"

      - name: Validate tag matches pyproject.toml version
        run: |
          PKG_VERSION=$(uv run --no-project python -c "
          import tomllib, pathlib
          d = tomllib.loads(pathlib.Path('pyproject.toml').read_text())
          print(d['project']['version'])
          ")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match pyproject.toml version $PKG_VERSION"
            exit 1
          fi
          echo "Version validated: $PKG_VERSION"

      - name: Build sdist and wheel
        run: uv build

      - name: Smoke test
        run: |
          uv run --isolated --no-project \
            --with dist/*.whl \
            python -c "
          from importlib.metadata import metadata
          m = metadata('voice-command')
          assert m['Name'] == 'voice-command', f'Wrong name: {m[\"Name\"]}'
          print(f'{m[\"Name\"]} {m[\"Version\"]} — metadata OK')
          "

      - name: Publish to PyPI
        run: uv publish

      - name: Create GitHub Release
        run: |
          gh release create "$GITHUB_REF_NAME" dist/* \
            --title "$GITHUB_REF_NAME" \
            --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}
